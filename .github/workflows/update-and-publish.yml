name: Update Dublin rent tracker and publish Pages

'on':
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "site/**"
      - "seeds/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "config.yaml"
      - "config.example.yaml"
      - ".github/workflows/update-and-publish.yml"
  schedule:
    - cron: "15 6 * * *"
      timezone: "Europe/Prague"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Update dataset from seed, Rent.ie RSS, and Gmail alerts
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python -m daft_tracker --config config.yaml --data-dir data --site-dir site update

      - name: Commit changed data back to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data site)" ]]; then
            git add data site
            git commit -m "Update Dublin rental dataset"
            git push
          else
            echo "No data changes to commit."
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify deployed dashboard contains Rent.ie listings
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          python - <<'PY'
          import json
          import os
          import time
          from urllib.request import Request, urlopen

          base_url = os.environ["PAGE_URL"].rstrip("/")
          expected_ids = {
              "rentie-6597748",
              "rentie-6597709",
              "rentie-6597624",
              "rentie-6596522",
              "rentie-6597522",
              "rentie-6596552",
          }
          last_error = None

          for attempt in range(12):
              cache_buster = int(time.time())
              try:
                  index_request = Request(
                      f"{base_url}/?verify={cache_buster}",
                      headers={"Cache-Control": "no-cache", "User-Agent": "rent-tracker-smoke-test"},
                  )
                  with urlopen(index_request, timeout=20) as response:
                      index_html = response.read().decode("utf-8", errors="replace")
                  if "Jen Rent.ie" not in index_html or "Nejnovější přidané první" not in index_html:
                      raise RuntimeError("deployed dashboard is missing the Rent.ie or date controls")

                  data_request = Request(
                      f"{base_url}/data/listings.json?verify={cache_buster}",
                      headers={"Cache-Control": "no-cache", "User-Agent": "rent-tracker-smoke-test"},
                  )
                  with urlopen(data_request, timeout=20) as response:
                      payload = json.load(response)

                  by_id = {
                      str(item.get("id")): item
                      for item in payload.get("listings", [])
                      if item.get("id")
                  }
                  missing = sorted(expected_ids - set(by_id))
                  if missing:
                      raise RuntimeError(f"deployed dataset is missing Rent.ie IDs: {missing}")

                  for listing_id in sorted(expected_ids):
                      item = by_id[listing_id]
                      if item.get("status") != "active":
                          raise RuntimeError(f"{listing_id} is not active on deployed Pages")
                      if int(item.get("double_beds") or 0) < 1:
                          raise RuntimeError(f"{listing_id} has no confirmed double bed on deployed Pages")
                      if "rent.ie/" not in str(item.get("url") or ""):
                          raise RuntimeError(f"{listing_id} does not point to Rent.ie")

                  print(f"Verified {len(expected_ids)} Rent.ie listings at {base_url}/")
                  for listing_id in sorted(expected_ids):
                      item = by_id[listing_id]
                      print(f"- {listing_id}: {item.get('title')} — EUR {item.get('price_eur')} / {item.get('rent_period')}")
                  break
              except Exception as exc:
                  last_error = exc
                  if attempt == 11:
                      raise
                  print(f"Pages verification attempt {attempt + 1} failed: {exc}")
                  time.sleep(5)
          else:
              raise RuntimeError(f"Pages verification failed: {last_error}")
          PY
