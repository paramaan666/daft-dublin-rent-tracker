name: Update Dublin rent tracker and publish Pages

'on':
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "site/**"
      - "seeds/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "config.yaml"
      - "config.example.yaml"
      - ".github/workflows/update-and-publish.yml"
  schedule:
    - cron: "15 6 * * *"
      timezone: "Europe/Prague"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Update dataset from seed, Rent.ie RSS, and Gmail alerts
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python -m daft_tracker --config config.yaml --data-dir data --site-dir site update

      - name: Commit changed data back to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data site)" ]]; then
            git add data site
            git commit -m "Update Dublin rental dataset"
            git push
          else
            echo "No data changes to commit."
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
