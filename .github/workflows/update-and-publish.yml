name: Update Dublin rent tracker and publish Pages

'on':
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "site/**"
      - "seeds/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "config.yaml"
      - "config.example.yaml"
      - ".github/workflows/update-and-publish.yml"
  schedule:
    - cron: "15 6 * * *"
      timezone: "Europe/Prague"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Update dataset from seed, Rent.ie RSS, and Gmail alerts
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python -m daft_tracker --config config.yaml --data-dir data --site-dir site update

      - name: Commit changed data back to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data site)" ]]; then
            git add data site
            git commit -m "Update Dublin rental dataset"
            git push
          else
            echo "No data changes to commit."
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Checkout main for verification record
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Verify deployed dashboard contains current Rent.ie listings
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          python - <<'PY'
          import csv
          import json
          import os
          import time
          from pathlib import Path
          from urllib.request import Request, urlopen

          base_url = os.environ["PAGE_URL"].rstrip("/")
          max_monthly_rent_eur = 1700
          seed_path = Path("seeds/rent_ie_seed.csv")
          with seed_path.open("r", encoding="utf-8-sig", newline="") as handle:
              seed_rows = {
                  row["id"].strip(): row
                  for row in csv.DictReader(handle)
                  if row.get("id") and row["id"].strip().startswith("rentie-")
              }
          expected_ids = set(seed_rows)
          if not expected_ids:
              raise RuntimeError("Rent.ie verification seed is empty")

          last_error = None
          for attempt in range(12):
              cache_buster = int(time.time())
              try:
                  index_request = Request(
                      f"{base_url}/?verify={cache_buster}",
                      headers={"Cache-Control": "no-cache", "User-Agent": "rent-tracker-smoke-test"},
                  )
                  with urlopen(index_request, timeout=20) as response:
                      index_html = response.read().decode("utf-8", errors="replace")
                  required_ui = [
                      "Jen Rent.ie",
                      "Nejnovější přidané první",
                      "function listingUrl(x)",
                  ]
                  missing_ui = [text for text in required_ui if text not in index_html]
                  if missing_ui:
                      raise RuntimeError(f"deployed dashboard is missing controls/link fix: {missing_ui}")

                  data_request = Request(
                      f"{base_url}/data/listings.json?verify={cache_buster}",
                      headers={"Cache-Control": "no-cache", "User-Agent": "rent-tracker-smoke-test"},
                  )
                  with urlopen(data_request, timeout=20) as response:
                      payload = json.load(response)

                  deployed_cap = int((payload.get("filters") or {}).get("max_monthly_rent_eur") or 0)
                  if deployed_cap != max_monthly_rent_eur:
                      raise RuntimeError(
                          f"deployed price cap is EUR {deployed_cap}, expected EUR {max_monthly_rent_eur}"
                      )

                  by_id = {
                      str(item.get("id")): item
                      for item in payload.get("listings", [])
                      if item.get("id")
                  }
                  missing = sorted(expected_ids - set(by_id))
                  if missing:
                      raise RuntimeError(f"deployed dataset is missing Rent.ie IDs: {missing}")

                  verified = []
                  for listing_id in sorted(expected_ids):
                      item = by_id[listing_id]
                      if item.get("status") != "active":
                          raise RuntimeError(f"{listing_id} is not active on deployed Pages")
                      if int(item.get("double_beds") or 0) < 1:
                          raise RuntimeError(f"{listing_id} has no confirmed double bed on deployed Pages")

                      raw_url = str(item.get("url") or "")
                      deployed_url = raw_url.rstrip("/") + "/"
                      expected_url = str(seed_rows[listing_id].get("url") or "").rstrip("/") + "/"
                      if deployed_url != expected_url:
                          raise RuntimeError(
                              f"{listing_id} URL differs from the verified seed: {deployed_url} != {expected_url}"
                          )
                      ad_id = listing_id.split("-", 1)[1]
                      if "/rooms-to-rent/" not in deployed_url or not deployed_url.endswith(f"/{ad_id}/"):
                          raise RuntimeError(f"{listing_id} is not a direct Rent.ie detail URL: {deployed_url}")

                      price = int(item.get("price_eur") or 0)
                      period = str(item.get("rent_period") or "month")
                      monthly_equivalent = price * 52 / 12 if period == "week" else price
                      if monthly_equivalent > max_monthly_rent_eur:
                          raise RuntimeError(
                              f"{listing_id} exceeds the EUR {max_monthly_rent_eur} monthly cap"
                          )

                      verified.append({
                          "id": listing_id,
                          "title": item.get("title"),
                          "price_eur": price,
                          "rent_period": period,
                          "url": deployed_url,
                      })

                  record = {
                      "verified": True,
                      "page_url": f"{base_url}/",
                      "max_monthly_rent_eur": max_monthly_rent_eur,
                      "dashboard_controls": [
                          "Rent.ie source filter",
                          "date-added filter",
                          "newest/oldest sorting",
                          "canonical Rent.ie detail links",
                      ],
                      "rent_ie_listings": verified,
                  }
                  output = Path(".verification/pages.json")
                  output.parent.mkdir(parents=True, exist_ok=True)
                  output.write_text(
                      json.dumps(record, ensure_ascii=False, indent=2) + "\n",
                      encoding="utf-8",
                  )

                  print(f"Verified {len(expected_ids)} Rent.ie listings at {base_url}/")
                  for item in verified:
                      print(
                          f"- {item['id']}: {item['title']} — "
                          f"EUR {item['price_eur']} / {item['rent_period']}"
                      )
                  break
              except Exception as exc:
                  last_error = exc
                  if attempt == 11:
                      raise
                  print(f"Pages verification attempt {attempt + 1} failed: {exc}")
                  time.sleep(5)
          else:
              raise RuntimeError(f"Pages verification failed: {last_error}")
          PY

      - name: Record successful Pages verification
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .verification/pages.json
          if git diff --cached --quiet; then
            echo "Pages verification record is unchanged."
          else
            git commit -m "Record verified Pages deployment"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
