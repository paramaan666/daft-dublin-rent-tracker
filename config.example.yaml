# Dublin rent tracker configuration
# Daft.ie is imported from Gmail alerts. Rent.ie is imported from its public RSS feed.
# The filters below are a common second safety layer for both sources.

locations:
  - Dublin 1
  - Dublin 2
  - Dublin 4
  - Dublin 6
  - Dublin 7
  - Dublin 8
  - Dublin 9
  - Dublin 10
  - Dublin 12
  - Dublin 14
  - Dublin 16

max_monthly_rent_eur: 1500
min_double_beds: 1

# Source payloads sometimes omit postcode, price, or bed type.
# Unknown location/bed count is kept for manual review; unknown price is rejected.
include_unknown_location: true
include_unknown_bed_count: true
include_unknown_price: false

# Gmail can import both Daft.ie and Rent.ie alert emails.
gmail_query: '{from:(daft.ie) from:(rent.ie)} newer_than:30d (rent OR rental OR property OR Daft OR Rent)'
gmail_max_messages: 50

# Rent.ie exposes an RSS link from its search results. The default feed covers Dublin;
# the common filters above narrow the imported listings.
rent_ie_enabled: true
rent_ie_feed_urls:
  - https://rss.rent.ie/houses-to-let/renting_dublin/
rent_ie_timeout_seconds: 20

# Without a listing-status API, disappearance cannot be proven immediately.
stale_after_days: 45
