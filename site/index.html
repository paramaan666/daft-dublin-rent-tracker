<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dublin Rent Tracker</title>
  <style>
    :root { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #111827; background: #f8fafc; }
    body { margin: 0; padding: 24px; }
    header { max-width: 1100px; margin: 0 auto 24px; }
    h1 { margin: 0 0 8px; font-size: clamp(28px, 4vw, 42px); }
    .meta { color: #475569; line-height: 1.5; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 12px; margin: 20px 0; }
    input, select, button.action { padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 15px; background: white; }
    button.action { cursor: pointer; color: #334155; }
    button.action:hover { background: #f1f5f9; }
    main { max-width: 1100px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .card { background: white; border: 1px solid #e2e8f0; border-radius: 18px; overflow: hidden; box-shadow: 0 1px 2px rgba(15, 23, 42, .06); }
    .thumb { height: 180px; background: #e2e8f0; display: flex; align-items: center; justify-content: center; color: #64748b; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .content { padding: 14px; }
    .price { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .title { font-weight: 650; margin-bottom: 8px; line-height: 1.3; }
    .muted { color: #64748b; font-size: 14px; }
    .badges { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
    .badge { border-radius: 999px; padding: 4px 8px; font-size: 12px; background: #eef2ff; color: #3730a3; }
    .warning { background: #fff7ed; color: #9a3412; }
    .inactive { background: #f1f5f9; color: #475569; }
    .good { background: #ecfdf5; color: #065f46; }
    .danger { background: #fef2f2; color: #991b1b; }
    .source-rent { background: #eff6ff; color: #1d4ed8; }
    .source-daft { background: #f5f3ff; color: #6d28d9; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    a.button { display: inline-block; padding: 9px 12px; background: #111827; color: white; border-radius: 10px; text-decoration: none; }
    .links { display: flex; gap: 12px; margin-top: 12px; }
    .links a { color: #2563eb; }
  </style>
</head>
<body>
  <header>
    <h1>Dublin Rent Tracker</h1>
    <div class="meta" id="meta">Načítám dataset…</div>
    <div class="links"><a href="data/listings.json">JSON</a><a href="data/listings.csv">CSV</a></div>
    <div class="toolbar">
      <input id="search" placeholder="Hledat lokalitu / název / důvod…" />
      <select id="source">
        <option value="all">Daft.ie + Rent.ie</option>
        <option value="daft">Jen Daft.ie</option>
        <option value="rent_ie">Jen Rent.ie</option>
      </select>
      <select id="status">
        <option value="active">Jen aktivní</option>
        <option value="all">Vše viditelné</option>
        <option value="confirmed">Jen ověřený double</option>
        <option value="needs_review">Potřebuje kontrolu</option>
        <option value="price_above_filter">Nad cenovým filtrem</option>
        <option value="possibly_removed">Možná pryč</option>
        <option value="hidden">Skryté</option>
      </select>
      <select id="added">
        <option value="all">Přidáno kdykoli</option>
        <option value="today">Přidáno dnes</option>
        <option value="3">Přidáno za poslední 3 dny</option>
        <option value="7">Přidáno za posledních 7 dní</option>
        <option value="30">Přidáno za posledních 30 dní</option>
      </select>
      <select id="sort">
        <option value="newest">Nejnovější přidané první</option>
        <option value="oldest">Nejstarší přidané první</option>
      </select>
    </div>
  </header>
  <main><div class="grid" id="grid"></div></main>
  <script>
    let listings = [];
    let updatedAt = '';
    const hiddenStorageKey = 'daft-hidden-listing-ids-v1';
    const hiddenIds = new Set(loadHiddenIds());
    const euro = new Intl.NumberFormat('en-IE', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });
    const dateFormatter = new Intl.DateTimeFormat('cs-CZ', { dateStyle: 'medium', timeStyle: 'short' });
    async function load() {
      const res = await fetch('data/listings.json', { cache: 'no-store' });
      const payload = await res.json();
      listings = payload.listings || [];
      updatedAt = payload.updated_at || 'zatím nikdy';
      render();
    }
    function sourceSite(x) {
      const raw = String(x.source || '').toLowerCase();
      if (raw.includes('rent_ie') || String(x.url || '').includes('rent.ie/')) return 'rent_ie';
      return 'daft';
    }
    function sourceLabel(x) { return sourceSite(x) === 'rent_ie' ? 'Rent.ie' : 'Daft.ie'; }
    function isConfirmedDouble(x) {
      return Number(x.double_beds || 0) >= 1 && !x.needs_review && x.status === 'active';
    }
    function timestamp(value) {
      const parsed = Date.parse(value || '');
      return Number.isFinite(parsed) ? parsed : 0;
    }
    function dateText(value) {
      const time = timestamp(value);
      return time ? dateFormatter.format(new Date(time)) : 'neznámé';
    }
    function addedWithin(x, period) {
      if (period === 'all') return true;
      const added = timestamp(x.first_seen);
      if (!added) return false;
      if (period === 'today') {
        const now = new Date();
        const addedDate = new Date(added);
        return addedDate.getFullYear() === now.getFullYear()
          && addedDate.getMonth() === now.getMonth()
          && addedDate.getDate() === now.getDate();
      }
      const days = Number(period);
      return Number.isFinite(days) && added >= Date.now() - days * 24 * 60 * 60 * 1000;
    }
    function compareAdded(a, b, direction) {
      const aTime = timestamp(a.first_seen);
      const bTime = timestamp(b.first_seen);
      if (!aTime && !bTime) return String(a.id || a.url || '').localeCompare(String(b.id || b.url || ''));
      if (!aTime) return 1;
      if (!bTime) return -1;
      const delta = aTime - bTime;
      if (delta) return direction === 'oldest' ? delta : -delta;
      return String(a.id || a.url || '').localeCompare(String(b.id || b.url || ''));
    }
    function render() {
      const q = document.getElementById('search').value.toLowerCase().trim();
      const source = document.getElementById('source').value;
      const status = document.getElementById('status').value;
      const added = document.getElementById('added').value;
      const sort = document.getElementById('sort').value;
      const active = listings.filter(x => x.status === 'active').length;
      const visibleActive = listings.filter(x => x.status === 'active' && !isHidden(x)).length;
      const confirmed = listings.filter(isConfirmedDouble).length;
      const review = listings.filter(x => x.needs_review).length;
      const above = listings.filter(x => x.status === 'price_above_filter').length;
      const hidden = listings.filter(isHidden).length;
      const daft = listings.filter(x => sourceSite(x) === 'daft').length;
      const rent = listings.filter(x => sourceSite(x) === 'rent_ie').length;
      document.getElementById('meta').textContent = `${visibleActive} viditelných aktivních / ${active} aktivních / ${listings.length} celkem. Daft.ie: ${daft}. Rent.ie: ${rent}. Ověřený double: ${confirmed}. Ke kontrole: ${review}. Nad cenovým filtrem: ${above}. Skryté: ${hidden}. Aktualizováno: ${updatedAt}.`;
      let rows = listings.filter(x => {
        const hiddenListing = isHidden(x);
        if (source !== 'all' && sourceSite(x) !== source) return false;
        if (!addedWithin(x, added)) return false;
        if (status === 'hidden') {
          if (!hiddenListing) return false;
        } else {
          if (hiddenListing) return false;
          if (status === 'active' && x.status !== 'active') return false;
          if (status === 'confirmed' && !isConfirmedDouble(x)) return false;
          if (status === 'needs_review' && !x.needs_review) return false;
          if (status === 'price_above_filter' && x.status !== 'price_above_filter') return false;
          if (status === 'possibly_removed' && x.status !== 'possibly_removed') return false;
        }
        if (q) {
          const hay = `${x.title || ''} ${x.location || ''} ${x.postcode || ''} ${sourceLabel(x)} ${(x.review_reasons || []).join(' ')}`.toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });
      rows.sort((a, b) => compareAdded(a, b, sort));
      document.getElementById('grid').innerHTML = rows.map(card).join('') || '<p>Žádné nabídky pro zvolený filtr.</p>';
    }
    function esc(s) { return String(s ?? '').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch])); }
    function loadHiddenIds() {
      try {
        const ids = JSON.parse(localStorage.getItem(hiddenStorageKey) || '[]');
        return Array.isArray(ids) ? ids : [];
      } catch {
        return [];
      }
    }
    function saveHiddenIds() {
      localStorage.setItem(hiddenStorageKey, JSON.stringify([...hiddenIds]));
    }
    function listingKey(x) { return x.id || x.url; }
    function isHidden(x) { return hiddenIds.has(listingKey(x)); }
    function hideListing(id) { hiddenIds.add(id); saveHiddenIds(); render(); }
    function restoreListing(id) { hiddenIds.delete(id); saveHiddenIds(); render(); }
    function priceText(x) {
      if (!x.price_eur) return 'Cena neznámá';
      const period = x.rent_period === 'week' ? 'týden' : 'měsíc';
      return `${euro.format(x.price_eur)} / ${period}`;
    }
    function card(x) {
      const reasons = (x.review_reasons || []).join(', ');
      const id = listingKey(x);
      const idArg = esc(JSON.stringify(id));
      const hiddenListing = isHidden(x);
      const statusClass = x.status === 'price_above_filter' ? 'danger' : (x.status === 'active' ? '' : 'inactive');
      const sourceClass = sourceSite(x) === 'rent_ie' ? 'source-rent' : 'source-daft';
      const badges = [
        `<span class="badge ${sourceClass}">${sourceLabel(x)}</span>`,
        `<span class="badge ${statusClass}">${esc(x.status || 'active')}</span>`,
        hiddenListing ? `<span class="badge inactive">skryté</span>` : '',
        isConfirmedDouble(x) ? `<span class="badge good">ověřený double</span>` : '',
        x.needs_review ? `<span class="badge warning" title="${esc(reasons)}">kontrola</span>` : '',
        x.postcode ? `<span class="badge">${esc(x.postcode)}</span>` : '',
        x.rent_period ? `<span class="badge">${esc(x.rent_period === 'week' ? 'týdně' : 'měsíčně')}</span>` : '',
        x.double_beds ? `<span class="badge">double: ${esc(x.double_beds)}</span>` : ''
      ].join('');
      return `<article class="card">
        <div class="thumb">${x.thumbnail_url ? `<img src="${esc(x.thumbnail_url)}" alt="" loading="lazy">` : 'bez fotky'}</div>
        <div class="content">
          <div class="price">${esc(priceText(x))}</div>
          <div class="title">${esc(x.title || x.url)}</div>
          <div class="muted">${esc(x.location || x.postcode || 'lokalita není dostupná ze zdroje')}</div>
          <div class="badges">${badges}</div>
          <div class="muted" title="${esc(reasons)}">${esc(reasons || 'bez poznámky')}</div>
          <div class="muted">Přidáno: ${esc(dateText(x.first_seen))}<br>Poslední signál: ${esc(dateText(x.last_seen))}</div>
          <div class="actions">
            <a class="button" href="${esc(x.url)}" target="_blank" rel="noopener noreferrer">Otevřít na ${sourceLabel(x)}</a>
            ${hiddenListing
              ? `<button class="action" type="button" onclick="restoreListing(${idArg})">Obnovit</button>`
              : `<button class="action" type="button" onclick="hideListing(${idArg})">Skrýt</button>`}
          </div>
        </div>
      </article>`;
    }
    document.getElementById('search').addEventListener('input', render);
    document.getElementById('source').addEventListener('change', render);
    document.getElementById('status').addEventListener('change', render);
    document.getElementById('added').addEventListener('change', render);
    document.getElementById('sort').addEventListener('change', render);
    load().catch(err => { document.getElementById('meta').textContent = 'Dataset se nepodařilo načíst: ' + err; });
  </script>
</body>
</html>
